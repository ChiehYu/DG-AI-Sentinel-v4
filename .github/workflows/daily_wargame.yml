name: DG AI Sentinel Daily Wargame & Push Notification

on:
  schedule:
    # 台灣時間每日早晨 08:26 = UTC 00:26 (僅限週一至週五，預留 4 分鐘執行資料擷取與沙盤推演，並準時於 08:30:00 發送手機推文)
    - cron: '26 0 * * 1-5'
  workflow_dispatch:
    # 支援 GitHub 後台手動觸發測試

jobs:
  run-sentinel-council:
    runs-on: ubuntu-latest
    # 【關鍵修復】賦予 GITHUB_TOKEN 寫入儲存庫的權限，避免 step 5 git push 發生 exit code 128 錯誤
    permissions:
      contents: write

    steps:
      - name: 1. 檢出專案程式碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'
            cache: 'pip'
            cache-dependency-path: 'backend/requirements.txt'

      - name: 3. 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: 4. 執行 4 大市場數據抓取、多標的 10 輪沙盤推演與 LINE 早晨策略快報推播
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        run: |
          cd backend
          python run_daily_sentinel.py

      - name: 5. 將更新後的市場 JSON 提交並推送至儲存庫 (供網頁端同步)
        run: |
          git config --global user.name "DG-AI-Sentinel-Bot"
          git config --global user.email "bot@sentinel.ai"
          git add data/market_context.json data/wargame_report.json || true
          if git diff --staged --quiet; then
            echo "沒有資料變更，略過提交。"
          else
            git commit -m "🤖 [AI Wargame] 更新當日 6 大個股沙盤推演與 Actionable Plan 數據 [skip ci]"
            git push
          fi
